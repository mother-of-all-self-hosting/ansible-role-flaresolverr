---
# Project source code URL:  https://github.com/FlareSolverr/FlareSolverr

flaresolverr_enabled: true

flaresolverr_identifier: flaresolverr
flaresolverr_base_path: "/{{ flaresolverr_identifier }}"

# renovate: datasource=docker depName=ghcr.io/flaresolverr/flaresolverr
flaresolverr_version: v3.5.0

# UID and GID for the files and folders belonging to the FlareSolverr service.
# These values are distinct from the UID and GID used when running the Docker container.
flaresolverr_uid: ""
flaresolverr_gid: ""

# User for the Docker container.
# FlareSolverr must run as the 'flaresolverr' user with UID 1000 and GID 1000.
flaresolverr_docker_uid: "1000"
flaresolverr_docker_gid: "1000"

# The hostname at which FlareSolverr is served.
flaresolverr_hostname: ""

# The path at which FlareSolverr is served.
# This value must either be `/` or not end with a slash (e.g. `/flaresolverr`).
flaresolverr_path_prefix: /

flaresolverr_container_image: "{{ flaresolverr_container_image_registry_prefix }}flaresolverr/flaresolverr:{{ flaresolverr_container_image_tag }}"
flaresolverr_container_image_tag: "{{ flaresolverr_version }}"
flaresolverr_container_image_registry_prefix: "{{ flaresolverr_container_image_registry_prefix_upstream }}"
flaresolverr_container_image_registry_prefix_upstream: "{{ flaresolverr_container_image_registry_prefix_upstream_default }}"
flaresolverr_container_image_registry_prefix_upstream_default: ghcr.io/
# TODO: add tasks to self-build the image

# The base container network. It will be auto-created by this role if it doesn't exist already.
flaresolverr_container_network: "{{ flaresolverr_identifier }}"

# Control if the container network is deleted on uninstalling.
flaresolverr_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `flaresolverr_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
flaresolverr_container_http_host_bind_port: ""

# The port number in the container
flaresolverr_container_http_port: 8191

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
flaresolverr_container_additional_networks: "{{ (flaresolverr_container_additional_networks_default + flaresolverr_container_additional_networks_auto + flaresolverr_container_additional_networks_custom) | unique }}"
flaresolverr_container_additional_networks_default: []
flaresolverr_container_additional_networks_auto: []
flaresolverr_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
flaresolverr_container_additional_volumes: "{{ flaresolverr_container_additional_volumes_auto + flaresolverr_container_additional_volumes_custom }}"
flaresolverr_container_additional_volumes_auto: []
flaresolverr_container_additional_volumes_custom: []

# flaresolverr_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `flaresolverr_container_labels_additional_labels`.
flaresolverr_container_labels_traefik_enabled: false
flaresolverr_container_labels_traefik_docker_network: "{{ flaresolverr_container_network }}"
flaresolverr_container_labels_traefik_hostname: "{{ flaresolverr_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/flaresolverr`).
flaresolverr_container_labels_traefik_path_prefix: "{{ flaresolverr_path_prefix }}"
flaresolverr_container_labels_traefik_rule: "Host(`{{ flaresolverr_container_labels_traefik_hostname }}`){% if flaresolverr_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ flaresolverr_container_labels_traefik_path_prefix }}`){% endif %}"
flaresolverr_container_labels_traefik_priority: 0
flaresolverr_container_labels_traefik_entrypoints: web-secure
flaresolverr_container_labels_traefik_tls: "{{ flaresolverr_container_labels_traefik_entrypoints != 'web' }}"
flaresolverr_container_labels_traefik_tls_certResolver: default # noqa var-naming
flaresolverr_container_labels_traefik_middleware_basic_auth_enabled: false
# See: https://doc.traefik.io/traefik/reference/routing-configuration/http/middlewares/basicauth/
flaresolverr_container_labels_traefik_middleware_basic_auth_users: ""

# flaresolverr_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
#
# Example:
# flaresolverr_container_labels_additional_labels: |
#   my.label=1
#   another.label="here"
flaresolverr_container_labels_additional_labels: ""

# Specify the size of the container's tmpfs volume
flaresolverr_container_tmpfs_tmp_size: 128m

# A list of extra arguments to pass to the container (`docker create` command)
flaresolverr_container_extra_arguments: "{{ flaresolverr_container_extra_arguments_auto + flaresolverr_container_extra_arguments_custom }}"
flaresolverr_container_extra_arguments_auto: []
flaresolverr_container_extra_arguments_custom: []

# List of systemd services that the FlareSolverr systemd service depends on
flaresolverr_systemd_required_services_list: "{{ (flaresolverr_systemd_required_services_list_default + flaresolverr_systemd_required_services_list_auto + flaresolverr_systemd_required_services_list_custom) | unique }}"
flaresolverr_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
flaresolverr_systemd_required_services_list_auto: []
flaresolverr_systemd_required_services_list_custom: []

# List of systemd services that the FlareSolverr systemd service wants
flaresolverr_systemd_wanted_services_list: "{{ (flaresolverr_systemd_wanted_services_list_default + flaresolverr_systemd_wanted_services_list_auto + flaresolverr_systemd_wanted_services_list_custom) | unique }}"
flaresolverr_systemd_wanted_services_list_default: []
flaresolverr_systemd_wanted_services_list_auto: []
flaresolverr_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
flaresolverr_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
flaresolverr_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
flaresolverr_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
flaresolverr_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ flaresolverr_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ flaresolverr_container_stop_grace_time_seconds }} {{ flaresolverr_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ flaresolverr_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ flaresolverr_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ flaresolverr_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ flaresolverr_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ flaresolverr_identifier }} after {{ flaresolverr_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# Specify the timezone
flaresolverr_environment_variables_tz: UTC

# Specify the URL against which FlareSolverr makes a request on start to make sure the web browser is working
flaresolverr_environment_variables_test_url: https://example.com

# Additional environment variables.
flaresolverr_environment_variables_additional_variables: ""

# flaresolverr_restart_necessary controls whether the FlareSolverr systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
flaresolverr_restart_necessary: false
