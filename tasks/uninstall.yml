---
- name: Check existence of FlareSolverr systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ flaresolverr_identifier }}.service"
  register: flaresolverr_service_stat

- name: Uninstall FlareSolverr systemd services and files
  when: flaresolverr_service_stat.stat.exists | bool
  block:
    - name: Ensure FlareSolverr systemd service is stopped
      ansible.builtin.service:
        name: "{{ flaresolverr_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure FlareSolverr systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ flaresolverr_identifier }}.service"
        state: absent

    - name: Ensure FlareSolverr container network does not exist
      when: flaresolverr_container_network_deletion_enabled
      block:
        - name: Ensure FlareSolverr container network does not exist via community.docker.docker_network
          when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
          community.docker.docker_network:
            name: "{{ flaresolverr_container_network }}"
            state: absent
          register: flaresolverr_network_deletion_result

        - name: Ensure FlareSolverr container network does not exist via ansible.builtin.command
          when: devture_systemd_docker_base_container_network_creation_method == 'command'
          ansible.builtin.command:
            cmd: >-
              {{ devture_systemd_docker_base_host_command_docker }} network rm
              {{ flaresolverr_container_network }}
          register: flaresolverr_network_deletion_result
          changed_when: flaresolverr_container_network in flaresolverr_network_deletion_result.stdout

    - name: Ensure FlareSolverr path does not exist
      ansible.builtin.file:
        path: "{{ flaresolverr_base_path }}"
        state: absent
